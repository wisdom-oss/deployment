# WISdoM Platform Compose File
version: "3.9"

services:
  # == Core services ==
  # The services listed here are always starting and required for the Dashboard
  # to function. Therefore, no profile is associated to them

  # Service Watcher
  # The service watcher regularly scans the docker host for containers running
  # on it which are labelled according to the watchers documentation and adds
  # them to the api gateway

  # HTTP Entrypoint
  # The http entrypoint uses caddy as the http server and works as a reverse
  # proxy for the different parts of the frontend and backend. It mainly routes
  # the traffic from a external user either to the authentik server running as
  # authorization software, the frontend or the api gateway for requests to
  # microservices
  http-entrypoint:
    image: caddy:alpine
    restart: always
    networks:
      - wisdom
    ports:
      - 80:80
      - 443:443
    environment:
      - FRONTEND_BINDING=${CADDY_FRONTEND_BINDING:?required}
      - AUTHENTIK_BINDING=${CADDY_AUTHENTIK_BINDING:?required}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    logging: &loggingConfig
      driver: "json-file"
      options:
        max-size: 5m
        max-file: 3

  # As database backend a PostgreSQL database is used with the PostGIS extension
  # enabled to allow the storage of geospatial data for the services. The data
  # is stored in a local mount to allow easier backup
  postgres:
    image: postgis/postgis:14-3.3-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "--dbname=wisdom"]
      start_period: 30s
      interval: 20s
      retries: 5
      timeout: 5s
    restart: always
    hostname: postgres
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./data/db-init/:/docker-entrypoint-initdb.d/
    networks:
      - wisdom
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres-pass
      - POSTGRES_USER=${PG_USER:-postgres}
      - POSTGRES_DB=wisdom
      - PGUSER=postgres
    secrets:
      - postgres-pass
    logging: *loggingConfig

  #The WISdoM Dashboard uses the Kong API Gateway to orgnaize the
  # microservice instances in the backend. It is extended by the gateway service
  # watcher which scans the docker host for containers tagged by lables which
  # are documented in the documentation for this repository.
  api-gateway:
    build: ./custom-images/kong/
    image: wisdom-oss/api-gateway:latest
    hostname: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - KONG_PG_PASSWORD_FILE=/run/secrets/postgres-pass
      - KONG_PG_USER=${PG_USER:-postgres}
      - KONG_PG_HOST=${PG_HOST:-postgres}
      - KONG_DATABASE=postgres
      - KONG_PROXY_ACCESS_LOG=/dev/null
      - KONG_ADMIN_ACCESS_LOG=/dev/null
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    networks:
      - wisdom
    labels:
      - wisdom-oss.isGateway=true
    secrets:
      - postgres-pass
    logging: *loggingConfig

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - wisdom
    volumes:
      - ./.data/redis:/data

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    hostname: authentik
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: ${PG_HOST:-postgres}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-postgres}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/postgres-pass
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik-secret-key
    volumes:
      - ./.data/authentik/media:/media
      - ./.data/authentik/custom-templates:/templates
    expose:
      - 9000
    networks:
      - wisdom
    secrets:
      - postgres-pass
      - authentik-secret-key

  authentik-configuration-server:
    profiles:
      - authentik-config
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    hostname: authentik
    depends_on:
      authentik-worker:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: ${PG_HOST:-postgres}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-postgres}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/postgres-pass
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik-secret-key
    volumes:
      - ./.data/authentik/media:/media
      - ./.data/authentik/custom-templates:/templates
    ports:
      - 9000:9000
    networks:
      - wisdom
    secrets:
      - postgres-pass
      - authentik-secret-key

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: ${PG_HOST:-postgres}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-postgres}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/postgres-pass
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik-secret-key
    user: root
    volumes:
      - ./.data/authentik/media:/media
      - ./.data/authentik/custom-templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.data/authentik/certs:/certs
    networks:
      - wisdom
    secrets:
      - postgres-pass
      - authentik-secret-key

  rabbitmq:
    image: rabbitmq:3-alpine
    hostname: rabbitmq
    networks:
      - wisdom
    restart: always
    expose:
      - 5672
    logging: *loggingConfig
    environment:
      - RABBITMQ_DEFAULT_USER=${AMQP_USER:-wisdom}
      - RABBITMQ_DEFAULT_PASS=${AMQP_PASSWORD:?amqp password required}

  frontend:
    build:
        context: https://github.com/wisdom-oss/frontend-workspace.git#${FRONTEND_BRANCH:-main}
        dockerfile: Dockerfile
        args:
          - OIDC_AUTHORITY=${FRONTEND_OPEN_ID_CONNECT_AUTHORITY:?openid connect authority missing}
          - OIDC_CLIENT_ID=${FRONTEND_OPEN_ID_CONNECT_AUTHORITY:?openid connect client id missing}
    image: wisdom-oss/frontend:main
    hostname: frontend
    networks:
        - wisdom
    restart: always
    # Expose the port 80 to other services
    expose:
        - 80
    logging: *loggingConfig

  usage-forecasts-rest:
    build: https://github.com/wisdom-oss/service-water-usage-forecasts-rest.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/usage-forecasts-rest:${SERVICE_BRANCH:-main}-latest
    networks:
      - wisdom
    restart: always
    expose:
      - 8000
    logging: *loggingConfig
    deploy:
      mode: replicated
      replicas: ${COMPOSE_SERVICE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_HOST=${PG_HOST:-postgres}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASS_FILE=/run/secrets/postgres-pass
      - PG_PORT=${PG_PORT:-5432}
      - AMQP_HOST=${AMQP_HOST:-rabbitmq}
      - AMQP_USER=${AMQP_USER:-wisdom}
      - AMQP_PASS_FILE=/run/secrets/amqp-pass
      - AMQP_EXCHANGE=${SERVICE__WATER_USAGE_FORECASTS__AMQP_EXCHANGE:-water-usage-forecasts}
      - CALCULATION_MODULE_ROUTING_KEY=${SERVICE__WATER_USAGE_FORECASTS__AMQP_ROUTING_KEY:-requests}
    labels:
      - wisdom-oss.service.name=water-usage-forecasts
      - wisdom-oss.service.path=/water-usage-forecasts
      - wisdom-oss.service.upstream-name=water-usage-forecasts

  usage-forecasts-calculations:
    build: https://github.com/wisdom-oss/service-water-usage-forecasts.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/usage-forecasts-rest-calculations:${SERVICE_BRANCH:-main}-latest
    networks:
      - wisdom
    restart: always
    logging: *loggingConfig
    deploy:
      mode: replicated
      replicas: ${COMPOSE_SERVICE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - CONFIG_DB_DSN=postgresql://${PG_USER:-postgres}:${PG_PASS:?password is required}@${PG_HOST:-postgres}:${PG_PORT:-5432}/wisdom
      - CONFIG_AMQP_DSN=amqp://${AMQP_USER:-wisdom}:${AMQP_PASSWORD:?password is required}@${AMQP_HOST:-rabbitmq}/%2F
    

  geodata:
    build: https://github.com/wisdom-oss/service-geo-data-rest.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/geodata-rest:${SERVICE_BRANCH:-main}-latest
    restart: always
    networks:
      - wisdom
    deploy:
      mode: replicated
      replicas: ${COMPOSE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_HOST=${PG_HOST:-postgres}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASS_FILE=/run/secrets/postgres-pass
      - PG_PORT=${PG_PORT:-5432}
    logging: *loggingConfig
    labels:
      - wisdom-oss.service.name=water-usage-forecasts
      - wisdom-oss.service.path=/water-usage-forecasts
      - wisdom-oss.service.upstream-name=water-usage-forecasts

  consumers:
    build: https://github.com/wisdom-oss/service-consumers.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/consumers-rest:${SERVICE_BRANCH:-main}-latest
    restart: always
    networks:
      - wisdom
    deploy:
      mode: replicated
      replicas: ${COMPOSE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_HOST=${PG_HOST:-postgres}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASS_FILE=/run/secrets/postgres-pass
      - PG_PORT=${PG_PORT:-5432}
    logging: *loggingConfig
    labels:
      - wisdom-oss.service.name=consumers
      - wisdom-oss.service.path=/consumers
      - wisdom-oss.service.upstream-name=consumers

  water-rights:
    build: https://github.com/wisdom-oss/service-water-rights.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/water-rights-rest:${SERVICE_BRANCH:-main}-latest
    restart: always
    networks:
      - wisdom
    deploy:
      mode: replicated
      replicas: ${COMPOSE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_HOST=${PG_HOST:-postgres}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASS_FILE=/run/secrets/postgres-pass
      - PG_PORT=${PG_PORT:-5432}
    logging: *loggingConfig
    labels:
      - wisdom-oss.service.name=water-rights
      - wisdom-oss.service.path=/water-rights
      - wisdom-oss.service.upstream-name=water-rights

  prophet-forecast:
    build: https://github.com/wisdom-oss/service-prophet-forecast.git#${SERVICE_BRANCH:-main}
    image: wisdom-oss/prophet-forecast-rest:${SERVICE_BRANCH:-main}-latest
    restart: always
    networks:
      - wisdom
    deploy:
      mode: replicated
      replicas: ${COMPOSE_REPLICAS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_HOST=${PG_HOST:-postgres}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASS_FILE=/run/secrets/postgres-pass
      - PG_PORT=${PG_PORT:-5432}
    logging: *loggingConfig
    labels:
      - wisdom-oss.service.name=prophet-usage-forecast
      - wisdom-oss.service.path=/prophet
      - wisdom-oss.service.upstream-name=prophet-usage-forecast

configs:
  caddyfile:
    file: ./configs/caddy/Caddyfile
  redis:
    file: ./configs/redis/redis.conf

secrets:
  postgres-pass:
    file: ./.secrets/.pgpass
  amqp-pass:
    file: ./.secrets/.rabbitmqpass
  redis-pass:
    file: ./.secrets/.redispass
  authentik-secret-key:
    file: ./.secrets/.authentik-secret-key

networks:
  wisdom:
    driver: bridge
    name: wisdom
    driver_opts:
      com.docker.network.bridge.name: br-wisdom
    ipam:
      driver: default
      config:
        - subnet: 172.31.0.0/16
