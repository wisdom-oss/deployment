# WISdoM Platform Compose File
version: "3.9"

services:
  # == Core services ==
  # The services listed here are always starting and required for the Dashboard
  # to function. Therefore, no profile is associated to them

  # HTTP Entrypoint
  # The http entrypoint uses caddy as the http server and works as a reverse
  # proxy for the different parts of the frontend and backend. It mainly routes
  # the traffic from a external user either to the authentik server running as
  # authorization software, the frontend or the api gateway for requests to
  # microservices
  http-entrypoint:
    image: caddy:alpine
    restart: always
    networks:
      - wisdom
    ports:
      - 80:80
      - 443:443
    environment:
      - FRONTEND_BINDING=${CADDY_FRONTEND_BINDING:?required}
      - AUTHENTIK_BINDING=${CADDY_AUTHENTIK_BINDING:?required}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    logging: &loggingConfig
      driver: "json-file"
      options:
        max-size: 5m
        max-file: 3

  # As database backend a PostgreSQL database is used with the PostGIS extension
  # enabled to allow the storage of geospatial data for the services. The data
  # is stored in a local mount to allow easier backup
  postgres:
    image: postgis/postgis:14-3.3-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "--dbname=wisdom"]
      start_period: 30s
      interval: 20s
      retries: 5
      timeout: 5s
    restart: always
    hostname: postgres
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./data/db-init/:/docker-entrypoint-initdb.d/
    networks:
      - wisdom
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres-pass
      - POSTGRES_DB=wisdom
      - PGUSER=postgres
    secrets:
      - postgres-pass
    logging: *loggingConfig

  #The WISdoM Dashboard uses the Kong API Gateway to orgnaize the
  # microservice instances in the backend. It is extended by the gateway service
  # watcher which scans the docker host for containers tagged by lables which
  # are documented in the documentation for this repository.
  api-gateway:
    build: ./custom-images/kong/
    image: wisdom-oss/api-gateway:latest
    hostname: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - KONG_PG_PASSWORD_FILE=/run/secrets/postgres-pass
      - KONG_PG_USER=postgres
      - KONG_PG_HOST=postgres
      - KONG_DATABASE=postgres
      - KONG_PROXY_ACCESS_LOG=/dev/null
      - KONG_ADMIN_ACCESS_LOG=/dev/null
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    networks:
      - wisdom
    labels:
      - wisdom-oss.isGateway=true
    secrets:
      - postgres-pass
    logging: *loggingConfig

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - wisdom
    volumes:
      - ./.data/redis:/data

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/postgres-pass
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik-secret-key
    volumes:
      - ./.data/authentik/media:/media
      - ./.data/authentik/custom-templates:/templates
    networks:
      - wisdom
    secrets:
      - postgres-pass
      - authentik-secret-key

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/postgres-pass
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik-secret-key
    user: root
    volumes:
      - ./.data/authentik/media:/media
      - ./.data/authentik/custom-templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.data/authentik/certs:/certs
    networks:
      - wisdom
    secrets:
      - postgres-pass
      - authentik-secret-key


  frontend:
    build:
        context: https://github.com/wisdom-oss/frontend-workspace.git#main
        dockerfile: Dockerfile
    image: wisdom-oss/frontend:main
    hostname: frontend
    networks:
        - wisdom
    restart: always
    # Expose the port 80 to other services
    expose:
        - 80
    logging: *loggingConfig
  

configs:
  caddyfile:
    file: ./configs/caddy/Caddyfile
  redis:
    file: ./configs/redis/redis.conf

secrets:
  postgres-pass:
    file: ./.secrets/.pgpass
  rabbitmq-pass:
    file: ./.secrets/.rabbitmqpass
  redis-pass:
    file: ./.secrets/.redispass
  authentik-secret-key:
    file: ./.secrets/.authentik-secret-key

networks:
  wisdom:
    driver: bridge
    name: wisdom
    driver_opts:
      com.docker.network.bridge.name: br-wisdom
    ipam:
      driver: default
      config:
        - subnet: 172.31.0.0/16
