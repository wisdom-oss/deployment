# WISdoM OSS Docker Compose File
# branch: main
# Last Update: 07.11.2022
#
# This docker compose file contains all service definitions used by the full WISdoM dashboard.
# The services are directly built from the main branch of their repositories to include the latests
# features. This has the caveat that some changes may be breaking and some services may not work.
# If you depend on this dashboard please use the stable versions in docker-compose.yml
version: '3.8'


# Change the name of the network bridge
networks:
   wisdom:
    external: true

# Volumes for the services:
volumes:
   # Storage for automatically generated data from the reverse-proxy
   caddy_data:
   # Storage for automatically generated configurations from the reverse-proxy
   caddy_config:
   # Storage for the data stored in the postgres
   postgres_data:
      external: true
   # Storage for the redis persistance
   redis:
   # Storage for the geoip data
   geoip:

# Configuration files for the services
configs:
   caddyfile:
      file: ./.configs/Caddyfile

# Services for the WISdoM OSS
services:
   # A caddy server  running a reverse proxy for the frontend and the api gateway. Furthermore, the
   # server hosts the static files
   http-entrypoint:
      image: caddy:alpine
      restart: always
      networks:
         - wisdom
      ports:
         # Open the HTTP and HTTPS ports up on the host
         - 80:80
         - 443:443
         - 8080:8080
      volumes:
         # Store the automatically generated data in a volume
         - caddy_data:/data
         # Store the automatically generated configuration files in a volume
         - caddy_config:/config
         # Mount the static files into the container to make them available
         - ./static:/files:ro
      env_file:
         - .env
      configs:
         - source: caddyfile
           target: /etc/caddy/Caddyfile
      logging: &logger_config
         driver: "json-file"
         options:
            max-size: 5m
            max-file: 3

   # The database containing all data, equipped with the PostGIS extension to store
   # geospatial data
   postgres:
      image: postgis/postgis:14-3.3-alpine
      restart: always
      hostname: postgres
      networks:
         - wisdom
      expose:
         - 5432
      volumes:
         # Store the files created by postgres in the
         - postgres_data:/var/lib/postgresql/data
         - ./.sql-scripts/:/docker-entrypoint-initdb.d/
      environment:
         - POSTGRES_DB=wisdom
      env_file:
         - .env
      logging: *logger_config

   # The api gateway for the microservice architecture. It is based on the kong-api-gateway
   # which has
   api-gateway:
      build: ./.builds/kong/
      image: wisdom-oss/api-gateway:latest
      restart: always
      networks:
         - wisdom
      stop_grace_period: 1m
      hostname: api-gateway
      depends_on:
         - postgres
      environment:
         - KONG_DATABASE=postgres
         - KONG_PROXY_ACCESS_LOG=/dev/stdout
         - KONG_ADMIN_ACCESS_LOG=/dev/stdout
         - KONG_PROXY_ERROR_LOG=/dev/stderr
         - KONG_ADMIN_ERROR_LOG=/dev/stderr
         - KONG_ADMIN_LISTEN=0.0.0.0:8001
      env_file:
         - .env
      expose:
         - 8000
         - 8001
      logging: *logger_config

   # The message broker which is used to transmit messages between the different modules
   rabbitmq:
      image: rabbitmq:3-alpine
      restart: always
      hostname: rabbitmq
      networks:
         - wisdom
      expose:
         - 5672
      env_file:
         - .env
      logging: *logger_config

   redis:
      image: docker.io/library/redis:alpine
      command: --save 60 1 --loglevel warning
      restart: unless-stopped
      networks:
          - wisdom
      healthcheck:
         test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
         start_period: 20s
         interval: 30s
         retries: 5
         timeout: 3s
      volumes:
         - redis:/data
      logging: *logger_config

   authentik:
      image: ghcr.io/goauthentik/server:latest
      restart: unless-stopped
      hostname: authentik
      command: server
      networks:
         - wisdom
      environment:
         AUTHENTIK_REDIS__HOST: redis
      env_file:
         - .env
      volumes:
         - ./media:/media
         - ./custom-templates:/templates
      expose:
         - 9000

   authentik-worker:
      image: ghcr.io/goauthentik/server:latest
      restart: unless-stopped
      hostname: authentik
      command: worker
      networks:
         - wisdom
      environment:
         AUTHENTIK_REDIS__HOST: redis
      env_file:
         - .env
      user: root
      volumes:
         - /var/run/docker.sock:/var/run/docker.sock
         - ./media:/media
         - ./certs:/certs
         - ./custom-templates:/templates

   ##### WISdoM Containers #####
   # The container containing the frontend application
   frontend:
      build: 
         context: https://github.com/wisdom-oss/frontend-workspace.git#main
         dockerfile: Dockerfile
      image: wisdom-oss/frontend:main
      hostname: frontend
      networks:
         - wisdom
      restart: always
      # Expose the port 80 to other services
      expose:
         - 80
      logging: *logger_config

   s-auth-service:
      build: https://github.com/wisdom-oss/authorization-service.git#dev
      image: wisdom-oss/authorization-service:dev-latest
      stop_grace_period: 1m
      restart: always
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      expose:
         - 5000
      environment:
         - CONFIG_SERVICE_NAME=authorization-service
         - CONFIG_DB_DSN=postgresql://postgres:${PG_PASS}@postgres:5432/wisdom
         - CONFIG_KONG_HOST=api-gateway
         - CONFIG_KONG_ADMIN_PORT=8001
         - CONFIG_KONG_SERVICE_SLUG=auth

   # The REST server used to accept requests for the linear/logarithmic/polynomial
   # water usage forecasts
   s-usage-forecast-rest:
      build: 
         context: https://github.com/wisdom-oss/service-water-usage-forecasts-rest.git#main
         dockerfile: Dockerfile
      image: wisdom-oss/service/water-usage-forcast-rest:main
      stop_grace_period: 1m
      networks:
         - wisdom
      restart: always
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      expose:
         - 5000
      environment:
         - SERVICE_PATH=/water-usage-forecasts
      env_file:
         - .env
      logging: *logger_config

   # The client which calculates the water usage forecasts which are requested from the REST server
   # for the forecasts
   s-usage-forecast-calculations:
      build: https://github.com/wisdom-oss/service-water-usage-forecasts.git#main
      image: wisdom-oss/service/water-usage-forcast-calculations:main
      stop_grace_period: 1m
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - rabbitmq
         - postgres
      env_file:
         - .env
      logging: *logger_config

   # A microservice allowing access to the geospatial data stored in the postgres database
   s-geodata:
      build: https://github.com/wisdom-oss/service-geo-data-rest.git#main
      image: wisdom-oss/service/geodata:main
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      environment:
         - SERVICE_PATH=/geodata
      env_file:
         - .env
      logging: *logger_config

   # A microservce allowing access to the consumers stored in the postgres database
   s-consumers:
      build: https://github.com/wisdom-oss/service-consumers.git#main
      image: wisdom-oss/service/consumers:main
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      environment:
         - SERVICE_PATH=/consumers
      env_file:
         - .env
      logging: *logger_config

   s-water-rights:
      build: https://github.com/wisdom-oss/service-water-rights.git#main
      image: wisdom-oss/service/water-rights:main
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      environment:
         - SERVICE_PATH=/water-rights
      env_file:
         - .env
      logging: *logger_config

   s-bim-data:
      build: https://github.com/wisdom-oss/service-bim-data.git#main
      image: wisdom-oss/service/bim-data:main
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      environment:
         - SERVICE_PATH=/bim-data
      env_file:
         - .env

   s-prophet-forecast:
      build: https://github.com/wisdom-oss/service-prophet-forecast.git#main
      image: wisdom-oss/service/prophet-forecast:main
      restart: always
      networks:
         - wisdom
      deploy:
         mode: replicated
         replicas: ${COMPOSE_REPLICAS:-3}
      depends_on:
         - postgres
         - api-gateway
      environment:
         - SERVICE_PATH=/prophet-forecast
      env_file:
         - .env

      



