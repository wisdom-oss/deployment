server:
  port: 8090
  max-header-size: 16MB
  http2:
    enabled: true

eureka:
  client:
    eureka-service-url-poll-interval-seconds: 5
    healthcheck:
        enabled: true
    service-url:
        defaultZone: http://${SERVICE_REGISTRY_HOST}:8761/eureka/
    registry-fetch-interval-seconds: 5
    webclient:
        enabled: true
  instance:
    non-secure-port: 8090
    appname: api-gateway
    lease-expiration-duration-in-seconds: 5
    lease-renewal-interval-in-seconds: 1

spring:
  application:
    name: WISdoM API Gateway
  cloud:
    loadbalancer:
      cache:
        enabled: false
      ribbon:
        enabled: false
    gateway:
      httpclient:
        response-timeout: 1h
      discovery:
        locator:
          enabled: false
      default-filters:
        - RewritePath=(?<serviceId>/[^/]+)/(?<path>/?.*), /$\{path}
        - TokenRelay=
      # You may append new routes at the end of the already configured ones
      routes:
        - id: authorization-service
          uri: lb://authorization-service
          predicates:
            - Path=/auth/**
        - id: water-usage-forecasts
          uri: lb://water-usage-forecasts-rest
          predicates:
            - Path=/water-usage-forecasts/**
        - id: geodata-rest
          uri: lb://geo-data-rest
          predicates:
            - Path=/geodata-rest/**
