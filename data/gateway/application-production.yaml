server:
  port: 8090
  max-header-size: 16MB

eureka:
  client:
      eureka-service-url-poll-interval-seconds: 5
      healthcheck:
          enabled: true
      service-url:
          defaultZone: http://${SERVICE_REGISTRY_HOST}:8761/eureka/
      registry-fetch-interval-seconds: 5
      webclient:
          enabled: true
  instance:
    non-secure-port: 8090
    appname: api-gateway
    lease-expiration-duration-in-seconds: 5
    lease-renewal-interval-in-seconds: 1

spring:
  application:
    name: WISdoM API Gateway
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
    gateway:
      httpclient:
        response-timeout: 1h
      discovery:
        locator:
          enabled: false