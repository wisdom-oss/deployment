version: '3.8'

# Named volumes
volumes:
  mariadb_data:
  caddy_data:
  caddy_config:
  postgres_data:

# Networking Setup
networks:
  default:
    name: wisdom-oss
    driver: bridge

# Base Services for using the Product
services:
  reverse-proxy:
    image: caddy:2.4.6-alpine
    restart: always
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api-gateway
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./data/caddy/Caddyfile:/etc/caddy/Caddyfile

  frontend:
    build: https://github.com/wisdom-oss/frontend-workspace.git#main
    image: wisdom-oss/frontend:main-latest
    hostname: frontend
    restart: always
    expose:
      - 80

  message-broker:
    image: rabbitmq:3.9.9-management-alpine
    restart: always
    hostname: message-broker
    expose:
      - 5672
      - 15672
    environment:
      - RABBITMQ_DEFAULT_USER=wisdom
      - RABBITMQ_DEFAULT_PASS=<<gen-pass-rabbitmq>>

  database:
    image: mariadb:10.6.4-focal
    restart: always
    hostname: database
    ports:
      - 3306
    environment:
      MARIADB_ROOT_PASSWORD: <<gen-db-pass>>
    volumes:
      - mariadb_data:/var/lib/mysql

  postgres:
    image: postgis/postgis:14-master
    restart: always
    hostname: postgres
    ports:
      - 5432
    environment:
      - POSTGRES_PASSWORD=<<gen-postgres-pass>>
    volumes:
      - postgres_data:/var/lib/postgresql/data

  service-registry:
    build: https://github.com/wisdom-oss/service-registry.git#main
    image: wisdom-oss/service-registry:main-latest
    restart: always
    expose:
      - 8761
    hostname: service-registry

  api-gateway:
    build: https://github.com/wisdom-oss/api-gateway.git#main
    image: wisdom-oss/api-gateway:main-latest
    restart: always
    hostname:
      api-gateway
    expose:
      - 8090
    depends_on:
      - service-registry
    environment:
      SERVICE_REGISTRY_HOST: service-registry
    volumes:
      - ./data/gateway:/opt/api-gateway/config

  authorization-service:
    build: https://github.com/wisdom-oss/authorization-service.git#main
    image: wisdom-oss/authorization-service:main-latest
    restart: always
    depends_on:
      - database
    expose:
      - 5000
    hostname: authorization-service
    environment:
      - DATABASE_DSN=mysql+pymysql://root:<<gen-db-pass>>@database/authorization
      - AMQP_DSN=amqp://wisdom:<<gen-pass-rabbitmq>>@message-broker/%2F
      - SERVICE_REGISTRY_HOST=service-registry

  service-water-usage-forecasts-rest:
    build: https://github.com/wisdom-oss/service-water-usage-forecasts-rest.git#main
    image: wisdom-oss/water-usage-forecasts-rest:main-latest
    restart: always
    depends_on:
      - message-broker
    expose:
     - 5000
    environment:
      - DATABASE_DSN=mysql+pymysql://root:<<gen-db-pass>>@database/water_usage
      - AMQP_DSN=amqp://wisdom:<<gen-pass-rabbitmq>>@message-broker/%2F
      - SERVICE_REGISTRY_HOST=service-registry
    labels:
      - wisdom.oss.type=backend-service
      - wisdom.oss.protocol=AMQP,HTTP

  service-water-usage-forecasts-calculations:
    build: https://github.com/wisdom-oss/service-water-usage-forecasts.git#main
    image: wisdom-oss/water-usage-forecasts-calculations:main-latest
    restart: always
    depends_on:
      - message-broker
    expose:
     - 5000
    environment:
      - AMQP_DSN=amqp://wisdom:<<gen-pass-rabbitmq>>@message-broker/%2F
      - SERVICE_REGISTRY_HOST=service-registry
    labels:
      - wisdom.oss.type=backend-service
      - wisdom.oss.protocol=AMQP
